<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="When you're upset">
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body>
  <audio id="bgm" loop>
    <source src="audio.mp3" type="audio/mpeg">
  </audio>
  <button class="music-btn" onclick="toggleMusic()" aria-label="Toggle background music">🎵</button>

  <div class="container">
    <p>
      Hey… don't leave yet.<br><br>
      I'm not against you. I want to fix things, not win.
    </p>

    <button onclick="show('more')">Read this before we fight</button>
    <p id="more" class="hidden">
      It's always us vs the problem. Never you vs me.
    </p>

    <button onclick="location.href='menu.html'">Back</button>
    <div class="footer">Stay. We'll figure it out.</div>
  </div>
</body>
</html>
