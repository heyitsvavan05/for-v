<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="I miss you">
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body>
  <audio id="bgm" loop>
    <source src="audio.mp3" type="audio/mpeg">
  </audio>
  <button class="music-btn" onclick="toggleMusic()" aria-label="Toggle background music">🎵</button>

  <div class="container">
    <p>
      I miss you too… even when I don't say it.<br><br>
      You've become part of my normal.
    </p>

    <button onclick="show('more')">Do you really?</button>
    <p id="more" class="hidden">
      I wouldn't still be here if I didn't.
    </p>

    <button onclick="location.href='menu.html'">Back</button>
    <div class="footer">I always come back to you.</div>
  </div>
</body>
</html>
