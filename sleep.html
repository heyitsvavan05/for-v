<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="When you can't sleep">
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body>
  <audio id="bgm" loop>
    <source src="audio.mp3" type="audio/mpeg">
  </audio>
  <button class="music-btn" onclick="toggleMusic()" aria-label="Toggle background music">🎵</button>

  <div class="container">
    <p>
      Hey… your mind won't rest again, huh?<br><br>
      Just stay here for a bit. You're not alone tonight.
    </p>

    <button onclick="show('more')">Stay with me</button>
    <p id="more" class="hidden">
      You're safe to rest. Nothing needs fixing right now.
    </p>

    <button onclick="location.href='menu.html'">Back</button>
    <div class="footer">I'm right here.</div>
  </div>
</body>
</html>
