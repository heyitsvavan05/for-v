  <meta name="description" content="Happy Birthday">
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body>
  <audio id="bgm" loop preload="auto">
    <source src="audio.mp3" type="audio/mpeg">

  <div class="container">
    <h2>✨ Happy Birthday! ✨</h2>

      <video id="birthdayVideo" width="100%" controls playsinline>

      </video>
    </div>

    <p>
      I wanted to make this page just for you today.<br><br>
      Watching this, I hope you see yourself the way I see you—beautiful, capable, and so incredibly loved.
    </p>

    <button onclick="location.href='menu.html'">Back to Menu</button>

    <div class="special-message">
      <p><em>P.S. I'm so lucky to have you in my world. Stay amazing. ❤️</em></p>
    </div>
  </div>

</html>
